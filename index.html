<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precio Justo - San Martín</title>
    <style>
        /* ESTILOS BASE */
        body { margin:0; background:#f0f2f5; font-family:Arial, sans-serif; }
        .categoria-btn { 
            background: #f8f9fa; 
            color: #666; 
            padding: 10px 18px; 
            border-radius: 25px; 
            font-size: 14px; 
            border: 1px solid #ddd; 
            cursor: pointer; 
            white-space: nowrap;
            flex: 0 0 auto; /* Esto evita que se achiquen */
            transition: 0.3s;
        }
        .btn-active { 
            background: #e8f5e9 !important; 
            color: #2e7d32 !important; 
            border: 1px solid #2ecc71 !important; 
            font-weight: bold; 
        }
        
        /* Contenedor del Menú con Scroll Lateral */
        .menu-scroll {
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            padding: 15px; 
            background: white; 
            border-bottom: 1px solid #eee;
            -webkit-overflow-scrolling: touch; /* Suavidad en celu */
        }
        /* Ocultar la barra de scroll */
        .menu-scroll::-webkit-scrollbar { display: none; }

        .oferta-card { display: block; margin-bottom: 15px; }
        #loading { text-align: center; color: #666; padding: 20px; font-style: italic; }
    </style>
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
</head>
<body>

<div style="background:white; padding:15px; text-align:center; border-bottom:3px solid #2ecc71; position: sticky; top: 0; z-index: 100;">
    <span style="background:#2ecc71; color:white; padding:5px 12px; border-radius:50%; font-weight:bold;">✓</span>
    <h2 style="display:inline; margin-left:10px;">Precio Justo</h2>
    <p style="margin:5px 0 0; font-size:10px; color:#888;">SAN MARTÍN, MENDOZA</p>
</div>

<div class="menu-scroll">
    <div class="categoria-btn btn-active" onclick="filtrar('todas', this)">🌟 Todas</div>
    <div class="categoria-btn" onclick="filtrar('comida', this)">🍔 Comidas</div>
    <div class="categoria-btn" onclick="filtrar('carne', this)">🥩 Carnes</div>
    <div class="categoria-btn" onclick="filtrar('verduras y frutas', this)">🍎 Verduras y Frutas</div>
    <div class="categoria-btn" onclick="filtrar('indumentaria', this)">👗 Indumentaria</div>
    <div class="categoria-btn" onclick="filtrar('servicios', this)">🛠️ Servicios</div>
    <div class="categoria-btn" onclick="filtrar('cuidado personal', this)">💄 Cuidado Personal</div>
    <div class="categoria-btn" onclick="filtrar('productos artesanales', this)">🎨 Productos Artesanales</div>
</div>
<div id="contenedor-ofertas" style="padding: 15px;">
    <div id="loading">Cargando ofertas del barrio...</div>
</div>

<script>
    let todasLasOfertas = [];

    async function cargarOfertas() {
        try {
            // Agregamos un número al azar al final para engañar al caché
            const respuesta = await fetch('ofertas.json?v=' + Math.random());
            todasLasOfertas = await respuesta.json();
            mostrarOfertas(todasLasOfertas);
            document.getElementById('loading').style.display = 'none';
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('loading').innerText = 'Error al cargar. Refresca la página.';
        }
    }

    function mostrarOfertas(lista) {
        const contenedor = document.getElementById('contenedor-ofertas');
        contenedor.innerHTML = '';
        lista.forEach(o => {
            contenedor.innerHTML += `
                <div class="oferta-card">
                    <div style="background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                        <img src="${o.imagen}" style="width: 100%; height: 280px; object-fit: cover; border-bottom: 2px solid #eee;">
                        <div style="padding: 15px;">
                            <div style="color: #2ecc71; font-size: 11px; font-weight: bold;">✓ VERIFICADO</div>
                            <h3 style="margin: 5px 0;">${o.producto}</h3>
                            <p style="color: #27af61; font-size: 24px; font-weight: bold; margin: 5px 0;">$${o.precio}</p>
                            <p style="color: #666; font-size: 13px;">📍 ${o.negocio}</p>
                            <a href="https://wa.me/${o.whatsapp}?text=Hola!%20Vi%20tu%20anuncio%20en%20Precio%20Justo" style="display: block; margin-top: 15px; background: #25D366; color: white; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; text-decoration: none;">Contactar</a>
                        </div>
                    </div>
                </div>`;
        });
    }

    function filtrar(cat, btn) {
        document.querySelectorAll('.categoria-btn').forEach(b => b.classList.remove('btn-active'));
        btn.classList.add('btn-active');
        if (cat === 'todas') {
            mostrarOfertas(todasLasOfertas);
        } else {
            mostrarOfertas(todasLasOfertas.filter(o => o.categoria === cat));
        }
    }

    window.onload = cargarOfertas;
</script>
<div style="text-align: center; padding: 20px; background: white; border-top: 1px solid #eee; margin-top: 20px;">
    <p style="margin: 0; font-size: 12px; color: #888;">Vecinos que nos visitaron:</p>
    <img src="https://counter8.optistats.ovh/private/contadorvisitasgratis.php?c=8l877q888x39f55m887e1u74k6w3d3h8" border="0" title="contador de visitas" alt="contador de visitas">
</div>
</body>
</html>
