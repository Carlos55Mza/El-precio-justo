<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Carga - Precio Justo</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #e8f5e9; }
        .panel { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #2ecc71; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #resultado { background: #333; color: #fff; padding: 15px; margin-top: 20px; border-radius: 5px; font-family: monospace; font-size: 12px; display: none; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="panel">
    <h2>🚀 Cargar Nueva Oferta</h2>
    <input type="text" id="negocio" placeholder="Nombre del Negocio (Ej: Despensa Miriam)">
    <input type="text" id="producto" placeholder="Producto (Ej: Sándwichs de Miga)">
    <input type="number" id="precio" placeholder="Precio (Ej: 1000)">
    <select id="categoria">
        <option value="comida">🍔 Comida</option>
        <option value="carne">🥩 Carne</option>
        <option value="verdura">🍎 Verdura</option>
        <option value="servicio">🛠️ Servicio</option>
    </select>
    <input type="text" id="whatsapp" placeholder="WhatsApp (Ej: 542634XXXXXX)">
    <input type="text" id="imagen" placeholder="Link de la imagen (o nombre de archivo)">
    
    <button onclick="generarCodigo()">GENERAR CÓDIGO</button>

    <div id="resultado"></div>
</div>

<script>
function generarCodigo() {
    const neg = document.getElementById('negocio').value;
    const prod = document.getElementById('producto').value;
    const pre = document.getElementById('precio').value;
    const cat = document.getElementById('categoria').value;
    const wsp = document.getElementById('whatsapp').value;
    const img = document.getElementById('imagen').value;

    const codigo = `
    <div class="oferta-card ${cat}">
        <div style="background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <img src="${img}" style="width: 100%; height: 180px; object-fit: cover;">
            <div style="padding: 15px;">
                <div style="color: #2ecc71; font-size: 12px; font-weight: bold;">✓ OFERTA VERIFICADA</div>
                <h3 style="margin: 5px 0;">${prod}</h3>
                <p style="color: #27af61; font-size: 26px; font-weight: bold; margin: 5px 0;">$${pre}</p>
                <p style="color: #666; font-size: 14px;">📍 ${neg}</p>
                <a href="https://wa.me/${wsp}?text=Hola!%20Vi%20tu%20oferta%20en%20Precio%20Justo" style="display: block; margin-top: 15px; background: #25D366; color: white; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; text-decoration: none;">Pedir por WhatsApp</a>
            </div>
        </div>
    </div>`;

    document.getElementById('resultado').innerText = codigo;
    document.getElementById('resultado').style.display = 'block';
}
</script>

</body>
</html>
