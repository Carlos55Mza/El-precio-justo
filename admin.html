<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Seguro - Precio Justo JSON</title>
    <script>
        // TU CLAVE SECRETA (Mantenemos la misma)
        const claveCorrecta = "Mendoza2026";
        let intento = prompt("Acceso Restringido - Ingrese clave:");
        if (intento !== claveCorrecta) {
            window.location.href = "index.html";
        }
    </script>
    <style>
        body { font-family: Arial; padding: 20px; background: #e8f5e9; }
        .panel { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #2ecc71; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #resultado { background: #333; color: #fff; padding: 15px; margin-top: 20px; border-radius: 5px; font-family: monospace; font-size: 12px; display: none; white-space: pre-wrap; word-break: break-all; }
        .instrucciones { background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 13px; border: 1px solid #ffeeba; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>🚀 Cargar Nueva Oferta</h2>
        <div class="instrucciones">
            <b>¿Cómo usar este panel?</b><br>
            1. Completa los datos.<br>
            2. Clic en "GENERAR CÓDIGO JSON".<br>
            3. Copia el resultado negro.<br>
            4. Pégalo en tu archivo <b>ofertas.json</b> en GitHub, asegurándote de poner una coma <code>,</code> antes de pegar el nuevo bloque si ya hay ofertas.
        </div>
        
        <input type="number" id="id" placeholder="ID Único (Ej: 4, 5, 6...)">
        <input type="text" id="negocio" placeholder="Nombre del Negocio (Ej: Despensa Miriam)">
        <input type="text" id="producto" placeholder="Producto (Ej: Sándwichs de Miga)">
        <input type="number" id="precio" placeholder="Precio (Ej: 1.000)">
        
        <select id="categoria">
            <option value="comida">🍔 Comida</option>
            <option value="carne">🥩 Carne</option>
            <option value="verdura">🍎 Verduras y frutas</option>
            <option value="indumentaria">🛠️ Indumentaria</option>
            <option value="servicios">🍎 Servicios</option>
            <option value="cuidado personal">🛠️ Cuidado personal</option>
	    <option value="productos artesanales">🎨 Productos artesanales</option>
	</select>
        
        <input type="text" id="whatsapp" placeholder="WhatsApp (Ej: 542634XXXXXX)">
        <input type="text" id="imagen" placeholder="Link de la imagen">
        
        <button onclick="generarJSON()">GENERAR CÓDIGO JSON</button>
        
        <div id="resultado"></div>
    </div>

    <script>
    function generarJSON() {
        const id = document.getElementById('id').value;
        const neg = document.getElementById('negocio').value;
        const prod = document.getElementById('producto').value;
        const pre = document.getElementById('precio').value;
        const cat = document.getElementById('categoria').value;
        const wsp = document.getElementById('whatsapp').value;
        const img = document.getElementById('imagen').value;

        // Validar que el ID sea un número
        if(!id || isNaN(id)) {
            alert("Por favor, ingrese un ID numérico único.");
            return;
        }

        // Crear el objeto JSON en el formato que espera ofertas.json
        const ofertaJSON = {
            id: parseInt(id),
            categoria: cat,
            negocio: neg,
            producto: prod,
            precio: pre,
            whatsapp: wsp,
            imagen: img
        };

        // Convertir el objeto a texto formateado y mostrarlo
        const textoJSON = JSON.stringify(ofertaJSON, null, 2);
        
        document.getElementById('resultado').innerText = textoJSON;
        document.getElementById('resultado').style.display = 'block';
    }
    </script>
</body>
</html>
